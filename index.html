<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Humanoid Atlas</title>
    <meta
      name="description"
      content="A bilingual interactive textbook for learning humanoid robots, from mechanical anatomy to robot foundation models, VLA systems, control, safety, and data engines."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#/" aria-label="Humanoid Atlas home">
        <span class="brand-mark" aria-hidden="true">HA</span>
        <span>
          <strong data-i18n="brand">Humanoid Atlas</strong>
          <small data-i18n="tagline">From anatomy to robot foundation models</small>
        </span>
      </a>
      <nav class="header-actions" aria-label="Primary">
        <a class="nav-link" href="#/" data-i18n="home">Home</a>
        <a class="nav-link" href="#/advanced" data-i18n="founderMode">Advanced Systems</a>
        <div class="language-switch" role="group" aria-label="Language">
          <button type="button" data-lang="en" class="is-active">EN</button>
          <button type="button" data-lang="zh">中文</button>
        </div>
      </nav>
    </header>

    <main id="app" tabindex="-1"></main>

    <footer class="site-footer">
      <p data-i18n="footer">
        Built as a calm, bilingual living textbook for humanoid robotics.
      </p>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
